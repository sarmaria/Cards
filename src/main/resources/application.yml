server:
  port: 8081
spring:
  application:
    name: "cards"

  profiles:
    active: "prod"

  config:
    import: "optional:configserver:http://localhost:8071/"

  # Temporarily disabling rabbitmq dependencies
  # rabbitmq:
  #   host: "localhost"
  #   port: 5672
  #   username: "guest"
  #   password: "guest"

  datasource:
    url:  jdbc:h2:mem:cardsdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  # Eureka server will use this info actuator point to fetch the info detail of the service
  info:
    env:
      enabled: true
  # To provide shutdown endpoint for demo purpose only
  endpoint:
    shutdown:
      access: unrestricted


eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: "http://localhost:8070/eureka/"
    fetch-registry: true
    register-with-eureka: true

# Info details provided by the info actuator point
info:
  app:
    name: "cards"
    description: "Banking cards application"
    version: "1.0.0"